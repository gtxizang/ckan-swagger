resolver 8.8.8.8 8.8.4.4 valid=30s ipv6=off;

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers (defined in every location block via include)
    # Note: nginx's add_header in a location block replaces parent-level headers,
    # so we must include the full set in every block that uses add_header.

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
    gzip_min_length 1000;

    # ── CORS Proxy ───────────────────────────────────────────────
    # Proxies requests to CKAN API endpoints, adding CORS headers.
    # Only allows /api/action/datastore_search and datastore_search_sql.
    # The target CKAN base URL is passed as the X-CKAN-Target header.
    # This avoids SSRF by restricting to HTTPS and known API paths only.

    location /proxy/api/action/datastore_search_sql {
        # Only allow GET and POST
        if ($request_method !~ ^(GET|POST|OPTIONS)$) {
            return 405;
        }

        # Handle CORS preflight
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin "$http_origin" always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-CKAN-Target" always;
            add_header Access-Control-Max-Age 86400 always;
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }

        # Validate X-CKAN-Target header is present and HTTPS
        set $ckan_target $http_x_ckan_target;
        if ($ckan_target = "") {
            return 400 '{"error":"Missing X-CKAN-Target header"}';
        }
        if ($ckan_target !~ ^https://) {
            return 400 '{"error":"X-CKAN-Target must be HTTPS"}';
        }

        # Proxy to the target CKAN
        proxy_pass $ckan_target/api/action/datastore_search_sql$is_args$args;
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP "";
        proxy_set_header X-Forwarded-For "";
        proxy_pass_request_headers on;
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Credentials;

        # Add our own CORS headers
        add_header Access-Control-Allow-Origin "$http_origin" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-CKAN-Target" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    location /proxy/api/action/datastore_search {
        # Only allow GET and OPTIONS
        if ($request_method !~ ^(GET|OPTIONS)$) {
            return 405;
        }

        # Handle CORS preflight
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin "$http_origin" always;
            add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-CKAN-Target" always;
            add_header Access-Control-Max-Age 86400 always;
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }

        # Validate X-CKAN-Target header
        set $ckan_target $http_x_ckan_target;
        if ($ckan_target = "") {
            return 400 '{"error":"Missing X-CKAN-Target header"}';
        }
        if ($ckan_target !~ ^https://) {
            return 400 '{"error":"X-CKAN-Target must be HTTPS"}';
        }

        # Proxy to the target CKAN
        proxy_pass $ckan_target/api/action/datastore_search$is_args$args;
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP "";
        proxy_set_header X-Forwarded-For "";
        proxy_pass_request_headers on;
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Credentials;

        # Add our own CORS headers
        add_header Access-Control-Allow-Origin "$http_origin" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-CKAN-Target" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Block any other /proxy/ paths — only the two above are allowed
    location /proxy/ {
        return 404 '{"error":"Not found"}';
    }

    # ── Static file serving ──────────────────────────────────────

    # Cache vendor assets aggressively (Swagger UI bundle — rarely changes)
    location /vendor/ {
        expires 30d;
        add_header Cache-Control "public, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src *; font-src 'self' data:;" always;
    }

    # Cache app CSS/JS with moderate TTL
    location ~* \.(css|js)$ {
        expires 7d;
        add_header Cache-Control "public" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src *; font-src 'self' data:;" always;
    }

    # SPA fallback — serve index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src *; font-src 'self' data:;" always;
    }

    # Block dotfiles
    location ~ /\. {
        deny all;
        return 404;
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 '{"status":"ok"}';
        add_header Content-Type application/json always;
    }
}
